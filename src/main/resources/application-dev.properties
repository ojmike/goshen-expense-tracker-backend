# PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/goshen_expense_tracker
spring.datasource.username=hrm_user
spring.datasource.password=hrm_pass

# Show SQL in dev
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTI1Ni1hbGdvcml0aG0=}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Mail (Mailpit)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=noreply@goshen-tracker.local
app.base-url=http://localhost:5173

# Plaid (sandbox)
plaid.client-id=${PLAID_CLIENT_ID:}
plaid.secret=${PLAID_SECRET:}
plaid.environment=sandbox

# Cookie
app.cookie.secure=false
